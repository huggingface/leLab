name: Rebuild frontend/dist

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '!frontend/dist/**'
      - '!frontend/__init__.py'
      - '.github/workflows/build_frontend.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Commit dist if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if [[ -n "$(git status --porcelain frontend/dist)" ]]; then
            git add frontend/dist
            git commit -m "ci: rebuild frontend/dist [skip ci]"
            git push
          else
            echo "frontend/dist already up to date"
          fi
